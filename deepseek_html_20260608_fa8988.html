<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roméo & Juliette – L'Odyssée Murindwazuba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0A0A0A;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            overflow-x: hidden;
            color: #E8DCCC;
            transition: background 0.5s ease;
        }

        body.braise-mode {
            background: #000000;
            filter: contrast(1.05);
        }
        body.braise-mode .card, body.braise-mode .letter-box {
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem;
            backdrop-filter: blur(3px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .step {
            display: none;
            animation: fadeSlide 0.6s ease;
            width: 100%;
        }
        .step.active-step {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rose-container {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
            perspective: 800px;
        }
        .rose-3d {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 30% 30%, #3b1e2b, #0a0a0a);
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 0 2px #D4AF37 inset;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.3s;
            animation: floatRose 4s infinite;
        }
        .rose-3d::before {
            content: "🌹";
            position: absolute;
            font-size: 90px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 6px gold);
        }
        .rose-3d:hover {
            transform: rotateY(15deg) scale(1.02);
            box-shadow: 0 0 30px rgba(212,175,55,0.6);
        }
        @keyframes floatRose {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .handwritten {
            font-family: 'Cedarville Cursive', cursive;
            font-size: 1.4rem;
            background: rgba(0,0,0,0.6);
            padding: 1rem;
            border-left: 3px solid #D4AF37;
            margin: 1rem 0;
            text-align: center;
        }

        .btn-chapter {
            background: linear-gradient(135deg, #D4AF37, #b38f2a);
            border: none;
            color: #0A0A0A;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 2rem;
            transition: 0.2s;
            font-family: monospace;
        }
        .btn-chapter:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #D4AF37;
        }

        .refusal-area {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }
        .btn-yes, .btn-no {
            padding: 12px 32px;
            font-size: 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.1s ease;
            border: none;
            font-weight: bold;
        }
        .btn-yes {
            background: #D4AF37;
            color: #0A0A0A;
        }
        .btn-no {
            background: #2c1a1f;
            color: #E8DCCC;
            border: 1px solid #D4AF37;
            position: relative;
        }
        .badboy-bubble {
            background: black;
            color: #D4AF37;
            padding: 8px 18px;
            border-radius: 30px;
            position: fixed;
            font-size: 0.9rem;
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
            font-family: monospace;
            box-shadow: 0 0 10px gold;
        }

        .cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .dest-card {
            background: rgba(11,30,51,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #D4AF37;
            border-radius: 32px;
            padding: 1.5rem;
            width: 180px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .dest-card:hover {
            transform: translateY(-8px);
            background: #0B1E33;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 1rem 0;
        }
        .chip {
            background: #1e2a36;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #D4AF37;
        }
        .chip.selected {
            background: #D4AF37;
            color: black;
            box-shadow: 0 0 12px gold;
        }

        .badge-act {
            display: inline-block;
            background: #D4AF37;
            color: black;
            border-radius: 30px;
            padding: 4px 12px;
            margin: 4px;
            font-size: 0.8rem;
        }

        textarea {
            width: 100%;
            background: #1a1218;
            border: 2px solid #D4AF37;
            color: #f0e6d2;
            padding: 1rem;
            border-radius: 20px;
            font-family: 'Cedarville Cursive', cursive;
            font-size: 1rem;
        }

        .audio-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A0A0A;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .gold-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, gold, transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
        }
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .dest-card { width: 140px; }
        }
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="goldTrailContainer"></div>
<div class="audio-toggle" id="audioToggle">🎧</div>
<div class="container" id="app"></div>

<script>
    let audioCtx = null;
    let isAudioAllowed = false;
    let pianoGain, waveGain, violinGain;
    let pianoBuffer = null, waveBuffer = null;
    let currentPianoVol = 0.3;
    let audioEnabled = false;
    let toggleMuted = false;
    
    function initAudio() {
        if(audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        pianoGain = audioCtx.createGain();
        waveGain = audioCtx.createGain();
        violinGain = audioCtx.createGain();
        pianoGain.gain.value = 0;
        waveGain.gain.value = 0.1;
        violinGain.gain.value = 0;
        pianoGain.connect(audioCtx.destination);
        waveGain.connect(audioCtx.destination);
        violinGain.connect(audioCtx.destination);
        
        function createPianoLoop() {
            const duration = 4;
            const sampleRate = audioCtx.sampleRate;
            const length = duration * sampleRate;
            const buffer = audioCtx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<length; i++) {
                let t = i/sampleRate;
                let mel = 0;
                mel += Math.sin(2*Math.PI*261.63*t) * 0.3 * Math.exp(-t*0.5);
                mel += Math.sin(2*Math.PI*329.63*t*1.2) * 0.2;
                mel += Math.sin(2*Math.PI*392.00*t*0.8) * 0.15;
                mel += Math.sin(2*Math.PI*523.25*t*1.5) * 0.1 * Math.sin(t);
                data[i] = mel * 0.5;
            }
            return buffer;
        }
        function createWavePad() {
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate*6, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<buffer.length; i++) {
                let t = i/audioCtx.sampleRate;
                data[i] = Math.sin(2*Math.PI*110*t) * 0.2 * Math.sin(t*0.8) + Math.sin(2*Math.PI*220*t)*0.05;
            }
            return buffer;
        }
        pianoBuffer = createPianoLoop();
        waveBuffer = createWavePad();
        function playLoop(buffer, gainNode, loop=true) {
            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            src.loop = loop;
            src.connect(gainNode);
            src.start();
        }
        playLoop(pianoBuffer, pianoGain);
        playLoop(waveBuffer, waveGain);
        updatePianoVolume(currentPianoVol);
    }
    
    function updatePianoVolume(vol) {
        if(pianoGain) pianoGain.gain.value = vol * (toggleMuted ? 0 : 1);
    }
    function updateWaveVolume(vol) {
        if(waveGain) waveGain.gain.value = vol * (toggleMuted ? 0 : 1);
    }
    function playViolinNote() {
        if(!audioCtx || toggleMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(violinGain);
        osc.frequency.value = 880;
        gain.gain.value = 0.4;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+2);
        osc.stop(audioCtx.currentTime+2);
        violinGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
        violinGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+2.5);
    }
    function heartbeatBass() {
        if(!audioCtx || toggleMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 70;
        gain.gain.value = 0.5;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.5);
        osc.stop(audioCtx.currentTime+0.5);
        setTimeout(()=>{
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.value = 80;
            gain2.gain.value = 0.45;
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.4);
            osc2.stop(audioCtx.currentTime+0.4);
        },400);
    }

    let stepIndex = 0;
    let userData = {
        destination: null,
        date: null,
        activities: [],
        message: "",
        finalStepRevealed: false
    };
    let noClickCount = 0;
    let braiseActive = false;
    
    const app = document.getElementById('app');
    
    function saveToLocal() {
        localStorage.setItem('romeo_juliet_muri', JSON.stringify({stepIndex, userData, braiseActive}));
    }
    function loadLocal() {
        const data = localStorage.getItem('romeo_juliet_muri');
        if(data) {
            try{
                const parsed = JSON.parse(data);
                stepIndex = parsed.stepIndex || 0;
                userData = parsed.userData || {destination:null, date:null, activities:[], message:""};
                braiseActive = parsed.braiseActive || false;
                if(braiseActive) document.body.classList.add('braise-mode');
            }catch(e){}
        }
    }
    
    function render() {
        if(stepIndex === 0) renderStep0();
        else if(stepIndex === 1) renderStep1();
        else if(stepIndex === 2) renderStep2();
        else if(stepIndex === 3) renderStep3();
        else if(stepIndex === 4) renderStep4();
        else if(stepIndex === 5) renderStep5();
        else if(stepIndex === 6) renderFinal();
    }
    
    function nextStep() {
        stepIndex++;
        saveToLocal();
        render();
    }
    
    function renderStep0() {
        app.innerHTML = `
            <div class="step active-step">
                <div class="rose-container">
                    <div class="rose-3d" id="blackRose"></div>
                </div>
                <div class="handwritten">
                    "Muri, même les anges tombent... et moi je tombe pour toi."<br>
                    — ton ombre & ta lumière
                </div>
                <div id="petals-fall-area" style="text-align:center; margin:10px"></div>
                <button class="btn-chapter" id="nextChap">💋 Déchirer le voile du silence</button>
            </div>
        `;
        const roseDiv = document.getElementById('blackRose');
        let petalInterval = null;
        if(roseDiv) {
            roseDiv.addEventListener('mouseenter', ()=>{
                if(petalInterval) clearInterval(petalInterval);
                let count = 0;
                petalInterval = setInterval(()=>{
                    const petal = document.createElement('div');
                    petal.innerText = '🌹';
                    petal.style.position = 'fixed';
                    petal.style.left = (Math.random()*window.innerWidth) + 'px';
                    petal.style.top = '0px';
                    petal.style.fontSize = '18px';
                    petal.style.opacity = '0.8';
                    petal.style.pointerEvents = 'none';
                    petal.style.zIndex = '999';
                    petal.style.transition = 'all 2s ease';
                    document.body.appendChild(petal);
                    setTimeout(()=>{
                        petal.style.transform = 'translateY(80vh) rotate(20deg)';
                        petal.style.opacity = '0';
                        setTimeout(()=>petal.remove(),2000);
                    },10);
                    count++;
                    if(count>15) clearInterval(petalInterval);
                },300);
            });
        }
        document.getElementById('nextChap')?.addEventListener('click', ()=>{
            if(petalInterval) clearInterval(petalInterval);
            nextStep();
        });
    }
    
    function renderStep1() {
        app.innerHTML = `
            <div class="step active-step">
                <h2 style="text-align:center">❤️‍🔥 Le jeu du refus</h2>
                <div class="refusal-area">
                    <button class="btn-yes" id="yesBtn">❤️ Bien sûr</button>
                    <button class="btn-no" id="noBtn">🙈 Non</button>
                </div>
                <div id="badboyMsg" style="text-align:center; margin-top:1rem; min-height:70px;"></div>
            </div>
        `;
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const msgDiv = document.getElementById('badboyMsg');
        const phrases = [
            "T’as déjà vu un gangster accepter un non ? Moi non plus.",
            "Ce bouton ? Juste une légende urbaine.",
            "Désolé princesse, mais ton cœur a déjà répondu.",
            "T’es mignonne à essayer… mais c’est OUI."
        ];
        let evadeCount = 0;
        function moveNo() {
            if(evadeCount>=4) {
                if(noBtn){
                    noBtn.style.transform = 'scale(0)';
                    setTimeout(()=>{
                        noBtn.remove();
                        msgDiv.innerHTML = "Bon d’accord… Mais t’as capté l’idée 😏";
                    },100);
                }
                return;
            }
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            if(noBtn) {
                noBtn.style.position = 'fixed';
                noBtn.style.left = `${x}px`;
                noBtn.style.top = `${y}px`;
                msgDiv.innerHTML = phrases[evadeCount % phrases.length];
                evadeCount++;
                const bubble = document.createElement('div');
                bubble.className = 'badboy-bubble';
                bubble.innerText = phrases[evadeCount-1];
                bubble.style.left = x-20+'px';
                bubble.style.top = y-30+'px';
                document.body.appendChild(bubble);
                setTimeout(()=>bubble.remove(),1500);
            }
        }
        if(noBtn) {
            noBtn.addEventListener('mouseenter', moveNo);
            noBtn.addEventListener('click', (e)=>{
                e.preventDefault();
                moveNo();
            });
        }
        yesBtn?.addEventListener('click',()=>{
            for(let i=0;i<80;i++) starExplosion();
            document.body.style.background = 'radial-gradient(circle, #4a1a2e, #0A0A0A)';
            setTimeout(()=>{
                document.body.style.background = '';
            },2000);
            nextStep();
        });
        function starExplosion(){
            const star = document.createElement('div');
            star.innerHTML = '✨';
            star.style.position='fixed';
            star.style.left=Math.random()*window.innerWidth+'px';
            star.style.top=Math.random()*window.innerHeight+'px';
            star.style.fontSize='20px';
            star.style.pointerEvents='none';
            star.style.zIndex=999;
            star.style.animation='fadeSlide 0.5s ease-out forwards';
            document.body.appendChild(star);
            setTimeout(()=>star.remove(),800);
        }
    }
    
    function renderStep2() {
        app.innerHTML = `
            <div class="step active-step">
                <h2>Choisis notre échappée</h2>
                <div class="cards">
                    <div class="dest-card" data-dest="Marseille">🌊 Marseille<br><span style="font-size:12px">Là où le sel...</span></div>
                    <div class="dest-card" data-dest="Venise">🛶 Venise<br><span style="font-size:12px">Les canaux murmurent...</span></div>
                </div>
                <div id="quoteCity" style="margin-top:1rem; text-align:center;font-style:italic"></div>
                <button class="btn-chapter" id="confirmCity" style="margin-top:1.5rem">Suivant</button>
            </div>
        `;
        const cards = document.querySelectorAll('.dest-card');
        const quoteDiv = document.getElementById('quoteCity');
        cards.forEach(card=>{
            card.addEventListener('mouseenter',()=>{
                const city = card.getAttribute('data-dest');
                if(city === 'Marseille') quoteDiv.innerText = '"Là où le sel se mêle à ta peau… un baiser a le goût de l’éternité."';
                else quoteDiv.innerText = '"Les canaux murmurent ton prénom la nuit. J’y croiserai ton reflet."';
            });
            card.addEventListener('click',()=>{
                userData.destination = card.getAttribute('data-dest');
                confettisGolden();
                playViolinNote();
                cards.forEach(c=>c.style.border='1px solid #D4AF37');
                card.style.border='3px solid gold';
            });
        });
        document.getElementById('confirmCity')?.addEventListener('click',()=>{
            if(userData.destination) nextStep();
            else alert("Choisis une ville, mon rebelle romantique.");
        });
        function confettisGolden(){
            for(let i=0;i<30;i++){
                const conf=document.createElement('div');
                conf.innerHTML='✨';
                conf.style.position='fixed';
                conf.style.left=Math.random()*window.innerWidth+'px';
                conf.style.top='0px';
                conf.style.fontSize='16px';
                conf.style.transition='all 1s';
                setTimeout(()=>{conf.style.transform=`translateY(${window.innerHeight}px) rotate(360deg)`;},10);
                document.body.appendChild(conf);
                setTimeout(()=>conf.remove(),1000);
            }
        }
    }
    
    function renderStep3() {
        app.innerHTML = `
            <div class="step active-step">
                <h2>📅 La date au cœur brûlant</h2>
                <div class="cards">
                    <div class="dest-card" data-date="26 juillet">✨ 26 Juillet</div>
                    <div class="dest-card" data-date="27 juillet">🔥 27 Juillet</div>
                </div>
                <div id="ringAnim"></div>
                <button class="btn-chapter" id="confirmDate">Suivant</button>
            </div>
        `;
        const dateDivs = document.querySelectorAll('[data-date]');
        dateDivs.forEach(d=>{
            d.addEventListener('click',()=>{
                userData.date = d.getAttribute('data-date');
                const ring = document.getElementById('ringAnim');
                ring.innerHTML = '💍';
                ring.style.fontSize='3rem';
                ring.style.animation='fadeSlide 0.4s';
                setTimeout(()=>ring.innerHTML='',1000);
                playViolinNote();
                dateDivs.forEach(c=>c.style.border='1px solid #D4AF37');
                d.style.border='3px solid gold';
            });
        });
        document.getElementById('confirmDate')?.addEventListener('click',()=>{
            if(userData.date) nextStep();
            else alert("Sélectionne un jour, Muri.");
        });
    }
    
    function renderStep4() {
        const activitiesList = ["🩶 Plage","⛵ Bateau","🌅 Coucher de soleil","🍷 Dîner romantique","🌙 Balade nocturne","📸 Photos souvenirs","🎭 Découverte culturelle","🎹 Musique live","💃 Danse sous les étoiles","🏊 Nage","🍸 Apéritif face à la mer","🎨 Activités artistiques","👗 Stylisme / mode","🕯️ Surprise secrète","🌀 Moment improvisé"];
        app.innerHTML = `
            <div class="step active-step">
                <h2>🎨 Nos activités magiques</h2>
                <div class="chips-container" id="chipsList"></div>
                <div id="selectedBadges" style="margin:1rem 0;"></div>
                <button class="btn-chapter" id="nextAct">Suivant</button>
            </div>
        `;
        const chipsDiv = document.getElementById('chipsList');
        activitiesList.forEach(act=>{
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerText = act;
            chip.addEventListener('click',()=>{
                if(userData.activities.includes(act)){
                    userData.activities = userData.activities.filter(a=>a!==act);
                    chip.classList.remove('selected');
                } else {
                    userData.activities.push(act);
                    chip.classList.add('selected');
                    playViolinNote();
                    createGoldTrail();
                }
                updateBadges();
                saveToLocal();
            });
            chipsDiv.appendChild(chip);
        });
        function updateBadges(){
            const badgeDiv = document.getElementById('selectedBadges');
            badgeDiv.innerHTML = userData.activities.map(a=>`<span class="badge-act">${a}</span>`).join('');
        }
        function createGoldTrail(){
            const trail = document.createElement('div');
            trail.className='gold-trail';
            trail.style.left=(Math.random()*window.innerWidth)+'px';
            trail.style.top=(Math.random()*window.innerHeight)+'px';
            document.body.appendChild(trail);
            setTimeout(()=>trail.remove(),600);
        }
        updateBadges();
        document.getElementById('nextAct')?.addEventListener('click',()=>nextStep());
    }
    
    function renderStep5() {
        app.innerHTML = `
            <div class="step active-step">
                <h2>✍️ Message à la cire</h2>
                <textarea id="loveMsg" rows="5" placeholder="Écris ton message... Ton parfum sur ma veste en cuir..."></textarea>
                <div style="margin-top:8px;">🖤🔥✨ Ce message restera gravé.</div>
                <button class="btn-chapter" id="saveMsg">Suivant</button>
            </div>
        `;
        const textarea = document.getElementById('loveMsg');
        textarea.value = userData.message || "";
        textarea.addEventListener('input',()=>{
            userData.message = textarea.value;
            saveToLocal();
            if(userData.message.includes("stylisme") || userData.message.includes("mode")){
                for(let i=0;i<5;i++){
                    const hanger = document.createElement('div');
                    hanger.innerHTML = '🪝';
                    hanger.style.position='fixed';
                    hanger.style.left=Math.random()*window.innerWidth+'px';
                    hanger.style.top=Math.random()*window.innerHeight+'px';
                    hanger.style.fontSize='2rem';
                    hanger.style.animation='fadeSlide 1s forwards';
                    document.body.appendChild(hanger);
                    setTimeout(()=>hanger.remove(),1500);
                }
            }
        });
        document.getElementById('saveMsg')?.addEventListener('click',()=>nextStep());
    }
    
    function renderFinal() {
        const destQuote = userData.destination === 'Marseille' ? "Le Mistral portera nos rires" : "Le gondolier chantera pour toi";
        app.innerHTML = `
            <div class="step active-step">
                <h2>🌌 Destin Croisé</h2>
                <div style="background:#0B1E33; padding:1rem; border-radius: 32px;">
                    <p>📍 ${userData.destination || '?'}</p>
                    <p>📅 ${userData.date || '?'}</p>
                    <p>🎭 Activités: ${userData.activities.join(', ') || 'aucune'}</p>
                    <p>💌 Message: "${userData.message || '...'}"</p>
                    <p>✨ ${destQuote}</p>
                </div>
                <button class="btn-chapter" id="sendFinal">💖 Envoyer ma réponse</button>
            </div>
        `;
        document.getElementById('sendFinal')?.addEventListener('click',async()=>{
            heartbeatBass();
            const roseSpan = document.createElement('div');
            roseSpan.innerHTML = '🌹✨';
            roseSpan.style.position='fixed'; roseSpan.style.fontSize='6rem'; roseSpan.style.left='50%'; roseSpan.style.top='50%'; roseSpan.style.transform='translate(-50%,-50%)'; roseSpan.style.zIndex=1000; roseSpan.style.transition='all 1s';
            document.body.appendChild(roseSpan);
            setTimeout(()=>roseSpan.style.transform='translate(-50%,-80%) scale(2) rotate(20deg)',10);
            setTimeout(()=>roseSpan.remove(),2000);
            const formData = new FormData();
            formData.append('destination', userData.destination);
            formData.append('date', userData.date);
            formData.append('activities', userData.activities.join(','));
            formData.append('message', userData.message);
            try{
                await fetch('https://formspree.io/f/mkinezae', { method: 'POST', body: formData, headers:{'Accept':'application/json'} });
                alert("Ton destin est scellé, rebelle romantique. 💘");
            } catch(e){ alert("Message sauvegardé localement. Ton destin t'attend.");}
        });
    }
    
    function setupCanvas(){
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let w=window.innerWidth, h=window.innerHeight;
        let stars = Array(150).fill().map(()=>({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2, alpha:Math.random()}));
        function resize(){ canvas.width=w=window.innerWidth; canvas.height=h=window.innerHeight; }
        window.addEventListener('resize',resize); resize();
        let time=0;
        function draw(){
            if(!ctx) return;
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "#0A0A0A";
            ctx.fillRect(0,0,w,h);
            for(let i=0;i<4;i++){
                ctx.beginPath();
                ctx.moveTo(0, h*0.7 + Math.sin(time*0.005 + i)*20 + i*12);
                for(let x=0;x<w;x+=20){
                    let y = h*0.7 + Math.sin(x*0.01 + time*0.003 + i)*15 + i*10;
                    ctx.lineTo(x,y);
                }
                ctx.lineTo(w,h);
                ctx.lineTo(0,h);
                ctx.fillStyle = `rgba(11,30,51,0.2)`;
                ctx.fill();
            }
            stars.forEach(s=>{
                ctx.fillStyle = `rgba(255,215,0,${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r,0,Math.PI*2); ctx.fill();
                s.x -= 0.5; if(s.x<0) s.x=w;
            });
            requestAnimationFrame(draw);
            time++;
        }
        draw();
        document.addEventListener('mousemove',(e)=>{
            if(audioCtx && !toggleMuted){
                const sensZone = (e.clientY / h);
                if(sensZone < 0.3){
                    currentPianoVol = 0.5;
                    updatePianoVolume(0.5);
                } else {
                    currentPianoVol = 0.3;
                    updatePianoVolume(0.3);
                }
            }
        });
    }
    
    let clickCount=0;
    document.addEventListener('click',(e)=>{
        if(!audioEnabled && e.target.closest('#audioToggle')===null){
            initAudio();
            audioEnabled=true;
            if(audioCtx) audioCtx.resume();
            updatePianoVolume(0.3);
            updateWaveVolume(0.12);
        }
        if(e.detail===3){
            clickCount++;
            setTimeout(()=>clickCount=0,500);
            if(clickCount===3){
                braiseActive=!braiseActive;
                if(braiseActive) document.body.classList.add('braise-mode');
                else document.body.classList.remove('braise-mode');
                for(let i=0;i<30;i++){
                    const flame=document.createElement('div');
                    flame.innerHTML='🔥';
                    flame.style.position='fixed';
                    flame.style.left=Math.random()*window.innerWidth+'px';
                    flame.style.top=Math.random()*window.innerHeight+'px';
                    flame.style.fontSize='24px';
                    flame.style.pointerEvents='none';
                    document.body.appendChild(flame);
                    setTimeout(()=>flame.remove(),1000);
                }
                saveToLocal();
            }
        }
    });
    
    const toggleBtn = document.getElementById('audioToggle');
    toggleBtn?.addEventListener('click',()=>{
        toggleMuted = !toggleMuted;
        if(audioCtx){
            if(toggleMuted){
                pianoGain.gain.value = 0;
                waveGain.gain.value = 0;
                violinGain.gain.value=0;
            } else {
                updatePianoVolume(currentPianoVol);
                updateWaveVolume(0.12);
            }
        }
        toggleBtn.innerText = toggleMuted ? '🔇' : '🎧';
    });
    
    loadLocal();
    setupCanvas();
    render();
</script>
</body>
</html>
