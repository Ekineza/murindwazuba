<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Future syliste/Murindwazuba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0A0A0A;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            overflow-x: hidden;
            color: #E8DCCC;
            transition: background 0.5s ease;
        }

        body.braise-mode {
            background: #000000;
            filter: contrast(1.05);
        }
        body.braise-mode .card, body.braise-mode .letter-box {
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.35) contrast(1.1) saturate(0.9);
            transition: filter 0.5s ease;
        }
        body.braise-mode #bgVideo {
            filter: brightness(0.2) contrast(1.2) saturate(1.2);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem;
            backdrop-filter: blur(3px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .step {
            display: none;
            animation: fadeSlide 0.6s ease;
            width: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(212,175,55,0.3);
        }
        .step.active-step {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .rose-container {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
            perspective: 800px;
        }
        .rose-3d {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 30% 30%, #3b1e2b, #0a0a0a);
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 0 2px #D4AF37 inset;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.3s;
            animation: floatRose 4s infinite;
        }
        .rose-3d::before {
            content: "🌹";
            position: absolute;
            font-size: 90px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 6px gold);
        }
        .rose-3d:hover {
            transform: rotateY(15deg) scale(1.02);
            box-shadow: 0 0 30px rgba(212,175,55,0.6);
        }
        @keyframes floatRose {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .handwritten {
            font-family: 'Cedarville Cursive', cursive;
            font-size: 1.4rem;
            background: rgba(0,0,0,0.6);
            padding: 1rem;
            border-left: 3px solid #D4AF37;
            margin: 1rem 0;
            text-align: center;
        }

        .btn-chapter {
            background: linear-gradient(135deg, #D4AF37, #b38f2a);
            border: none;
            color: #0A0A0A;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }
        .btn-chapter:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #D4AF37;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            margin-right: 1rem;
        }
        .btn-secondary:hover {
            background: rgba(212,175,55,0.2);
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .refusal-area {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }
        .btn-yes, .btn-no {
            padding: 12px 32px;
            font-size: 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.1s ease;
            border: none;
            font-weight: bold;
        }
        .btn-yes {
            background: #D4AF37;
            color: #0A0A0A;
        }
        .btn-no {
            background: #2c1a1f;
            color: #E8DCCC;
            border: 1px solid #D4AF37;
            position: relative;
        }
        .badboy-bubble {
            background: black;
            color: #D4AF37;
            padding: 8px 18px;
            border-radius: 30px;
            position: fixed;
            font-size: 0.9rem;
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
            font-family: monospace;
            box-shadow: 0 0 10px gold;
        }

        .cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .dest-card {
            background: rgba(11,30,51,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #D4AF37;
            border-radius: 32px;
            padding: 1rem;
            width: 200px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .dest-card:hover {
            transform: translateY(-8px);
            background: #0B1E33;
        }
        .city-image {
            width: 100%;
            height: 120px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            margin-bottom: 10px;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 1rem 0;
        }
        .chip {
            background: #1e2a36;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #D4AF37;
        }
        .chip.selected {
            background: #D4AF37;
            color: black;
            box-shadow: 0 0 12px gold;
        }
        .badge-act {
            display: inline-block;
            background: #D4AF37;
            color: black;
            border-radius: 30px;
            padding: 4px 12px;
            margin: 4px;
            font-size: 0.8rem;
        }

        textarea {
            width: 100%;
            background: #1a1218;
            border: 2px solid #D4AF37;
            color: #f0e6d2;
            padding: 1rem;
            border-radius: 20px;
            font-family: 'Cedarville Cursive', cursive;
            font-size: 1rem;
        }
        .char-counter {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .beating-heart {
            animation: heartbeat 1s infinite;
            display: inline-block;
        }

        .audio-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A0A0A;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .floating-particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            animation: floatPop 1.5s ease-out forwards;
            font-size: 2.2rem;
        }
        @keyframes floatPop {
            0% { transform: scale(0.2) translateY(0); opacity: 1; }
            50% { transform: scale(1.3) translateY(-40px); opacity: 0.9; }
            100% { transform: scale(0.8) translateY(-120px); opacity: 0; }
        }
        @keyframes fallRotate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .dest-card { width: 160px; }
        }
    </style>
</head>
<body>
<video id="bgVideo" autoplay muted loop playsinline></video>
<canvas id="bgCanvas"></canvas>
<div class="audio-toggle" id="audioToggle">🎧</div>
<div class="container" id="app"></div>

<script>
    // ---------- VIDÉO ----------
    const videoElement = document.getElementById('bgVideo');
    videoElement.src = 'muri.mp4';
    videoElement.onerror = () => {
        console.log("Vidéo non trouvée, fond sombre par défaut");
        videoElement.style.display = 'none';
    };
    videoElement.play().catch(e => console.log("autoplay bloqué"));

    // ---------- AUDIO ----------
    let audioCtx = null;
    let pianoGain, waveGain, violinGain;
    let currentPianoVol = 0.3;
    let toggleMuted = false;
    
    function initAudio() {
        if(audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        pianoGain = audioCtx.createGain();
        waveGain = audioCtx.createGain();
        violinGain = audioCtx.createGain();
        pianoGain.gain.value = 0;
        waveGain.gain.value = 0.1;
        violinGain.gain.value = 0;
        pianoGain.connect(audioCtx.destination);
        waveGain.connect(audioCtx.destination);
        violinGain.connect(audioCtx.destination);
        function createPianoLoop() {
            const duration = 4;
            const sampleRate = audioCtx.sampleRate;
            const length = duration * sampleRate;
            const buffer = audioCtx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<length; i++) {
                let t = i/sampleRate;
                let mel = 0;
                mel += Math.sin(2*Math.PI*261.63*t) * 0.3 * Math.exp(-t*0.5);
                mel += Math.sin(2*Math.PI*329.63*t*1.2) * 0.2;
                mel += Math.sin(2*Math.PI*392.00*t*0.8) * 0.15;
                mel += Math.sin(2*Math.PI*523.25*t*1.5) * 0.1 * Math.sin(t);
                data[i] = mel * 0.5;
            }
            return buffer;
        }
        function createWavePad() {
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate*6, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<buffer.length; i++) {
                let t = i/audioCtx.sampleRate;
                data[i] = Math.sin(2*Math.PI*110*t) * 0.2 * Math.sin(t*0.8) + Math.sin(2*Math.PI*220*t)*0.05;
            }
            return buffer;
        }
        const pianoBuffer = createPianoLoop();
        const waveBuffer = createWavePad();
        function playLoop(buffer, gainNode) {
            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            src.loop = true;
            src.connect(gainNode);
            src.start();
        }
        playLoop(pianoBuffer, pianoGain);
        playLoop(waveBuffer, waveGain);
        updatePianoVolume(currentPianoVol);
    }
    function updatePianoVolume(vol) {
        if(pianoGain) pianoGain.gain.value = vol * (toggleMuted ? 0 : 1);
    }
    function playViolinNote() {
        if(!audioCtx || toggleMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(violinGain);
        osc.frequency.value = 880;
        gain.gain.value = 0.4;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+2);
        osc.stop(audioCtx.currentTime+2);
        violinGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
        violinGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+2.5);
    }
    function heartbeatBass() {
        if(!audioCtx || toggleMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 70;
        gain.gain.value = 0.5;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.5);
        osc.stop(audioCtx.currentTime+0.5);
        setTimeout(()=>{
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.value = 80;
            gain2.gain.value = 0.45;
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.4);
            osc2.stop(audioCtx.currentTime+0.4);
        },400);
    }
    function createGoldTrail() {
        const trail = document.createElement('div');
        trail.className = 'gold-trail';
        trail.style.position = 'fixed';
        trail.style.width = '8px';
        trail.style.height = '8px';
        trail.style.background = 'radial-gradient(circle, gold, transparent)';
        trail.style.borderRadius = '50%';
        trail.style.pointerEvents = 'none';
        trail.style.left = (Math.random()*window.innerWidth)+'px';
        trail.style.top = (Math.random()*window.innerHeight)+'px';
        document.body.appendChild(trail);
        setTimeout(()=>trail.remove(),600);
    }

    // ========== ANIMATIONS SPECTACULAIRES ==========
    function showBigEffect(emoji, x, y) {
        const div = document.createElement('div');
        div.innerText = emoji;
        div.style.position = 'fixed';
        div.style.left = (x || window.innerWidth/2) + 'px';
        div.style.top = (y || window.innerHeight/2) + 'px';
        div.style.fontSize = '3.5rem';
        div.style.pointerEvents = 'none';
        div.style.zIndex = '2000';
        div.style.filter = 'drop-shadow(0 0 12px gold)';
        div.style.animation = 'floatPop 1.2s ease-out forwards';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1200);
    }

    function rainEmojis(emoji, count) {
        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                const e = document.createElement('div');
                e.innerText = emoji;
                e.style.position = 'fixed';
                e.style.left = Math.random() * window.innerWidth + 'px';
                e.style.top = '-30px';
                e.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
                e.style.pointerEvents = 'none';
                e.style.zIndex = '999';
                e.style.filter = 'drop-shadow(0 0 8px gold)';
                e.style.animation = `fallRotate ${0.8 + Math.random() * 0.8}s linear forwards`;
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 2000);
            }, i * 80);
        }
    }

    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
        @keyframes fallRotate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    `;
    document.head.appendChild(styleSheet);

    function starExplosion() {
        const s=document.createElement('div'); 
        s.innerHTML='✨'; 
        s.style.position='fixed'; 
        s.style.left=Math.random()*window.innerWidth+'px'; 
        s.style.top=Math.random()*window.innerHeight+'px'; 
        s.style.pointerEvents='none'; 
        s.style.zIndex='999'; 
        s.style.fontSize='2rem'; 
        s.style.filter='drop-shadow(0 0 6px gold)'; 
        document.body.appendChild(s); 
        setTimeout(()=>s.remove(),800);
    }

    // ---------- ÉTAT ----------
    let stepIndex = 0;
    let userData = {
        destination: null,
        date: null,
        activities: [],
        message: "",
        userName: ""
    };
    let braiseActive = false;
    let audioEnabled = false;
    const app = document.getElementById('app');
    
    function saveToLocal() {
        localStorage.setItem('romeo_juliette_muri', JSON.stringify({stepIndex, userData, braiseActive}));
    }
    
    function loadLocal() {
        const data = localStorage.getItem('romeo_juliette_muri');
        if(data) {
            try{
                const parsed = JSON.parse(data);
                stepIndex = 0;
                userData = parsed.userData || {destination:null, date:null, activities:[], message:"", userName:""};
                braiseActive = parsed.braiseActive || false;
                if(braiseActive) document.body.classList.add('braise-mode');
            }catch(e){}
        }
    }
    
    function nextStep() {
        stepIndex++;
        saveToLocal();
        render();
    }
    function prevStep() {
        if(stepIndex > 0) stepIndex--;
        saveToLocal();
        render();
    }
    
    function render() {
        if (stepIndex === 0) renderStep0();
        else if (stepIndex === 0.5) renderStep0_5();
        else if (stepIndex === 1) renderStep1();
        else if (stepIndex === 2) renderStep2();
        else if (stepIndex === 3) renderStep3();
        else if (stepIndex === 4) renderStep4();
        else if (stepIndex === 5) renderStep5();
        else if (stepIndex === 6) renderFinal();
    }
    
    // ÉTAPE 0 : Rose noire
    function renderStep0() {
        app.innerHTML = `
            <div class="step active-step">
                <div class="rose-container"><div class="rose-3d" id="blackRose"></div></div>
                <div class="handwritten">"Un an plus tard, je ne cherche plus l'amour,<br>je constate ce qu'il est devenu."<br>— ton ombre & ta lumière</div>
                <div class="button-group"><button class="btn-chapter" id="nextChap">💋 Déchirer le voile du silence 🌹</button></div>
            </div>
        `;
        document.getElementById('nextChap')?.addEventListener('click', () => {
            stepIndex = 0.5;
            render();
        });
        const rose = document.getElementById('blackRose');
        if(rose) rose.addEventListener('mouseenter', ()=>{
            for(let i=0;i<12;i++) {
                const petal = document.createElement('div');
                petal.innerText = '🌹';
                petal.style.position='fixed';
                petal.style.left=Math.random()*window.innerWidth+'px';
                petal.style.top='0px';
                petal.style.fontSize='18px';
                petal.style.transition='all 2s';
                petal.style.pointerEvents='none';
                document.body.appendChild(petal);
                setTimeout(()=>{petal.style.transform='translateY(90vh) rotate(20deg)'; petal.style.opacity='0'; setTimeout(()=>petal.remove(),2000);},10);
            }
        });
    }
    
    // ÉTAPE 0.5 : IDENTIFICATION ROMANTIQUE BADBOY
    function renderStep0_5() {
        app.innerHTML = `
            <div class="step active-step">
                <div style="text-align:center;margin-bottom:30px;">
                    <div style="font-size:3rem;animation:heartbeat 1.2s infinite;">💓</div>
                    <h2 style="font-size:2.4rem;color:#E8DCCC;text-shadow:0 0 15px rgba(212,175,55,0.6);margin-top:10px;">🔥 Identifie-toi</h2>
                    <p style="margin-top:25px;line-height:1.9;font-size:1.15rem;">
                        On ne traverse pas mon histoire sans laisser son nom.
                        <br><br>
                        Avant que Venise ne reflète nos ombres sur ses canaux...
                        <br><br>
                        J'ai besoin de savoir une chose.
                        <br><br>
                        <span style="font-size:1.4rem;color:#D4AF37;font-weight:bold;">🖤 À qui ai-je l'honneur ? 🌹</span>
                    </p>
                </div>
                <div style="display:flex;justify-content:center;">
                    <input type="text" id="customNameInput" maxlength="30" placeholder="✨ Écris ton nom..." style="width:100%;max-width:500px;padding:18px 25px;border-radius:60px;border:2px solid #D4AF37;background:rgba(0,0,0,0.75);color:#E8DCCC;font-size:1.15rem;text-align:center;outline:none;transition:.3s;box-shadow:0 0 15px rgba(212,175,55,0.15);">
                </div>
                <div style="display:flex;justify-content:center;margin-top:40px;">
                    <button id="validateName" class="btn-chapter" style="font-size:1.15rem;padding:18px 40px;border-radius:50px;box-shadow:0 0 20px rgba(212,175,55,.35);">💓🌹 Continuer 🌹💓</button>
                </div>
            </div>
        `;

        const nameInput = document.getElementById('customNameInput');
        const validateBtn = document.getElementById('validateName');

        validateBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            if (name === "") {
                rainEmojis('🥀', 15);
                alert("Même les inconnues laissent une trace... 🌹");
                return;
            }
            userData.userName = name;
            saveToLocal();
            heartbeatBass();
            rainEmojis('💓', 40);
            rainEmojis('🌹', 40);
            rainEmojis('✨', 50);
            rainEmojis('🦋', 20);
            showBigEffect('💘');
            showBigEffect('🌹');
            for (let i = 0; i < 80; i++) {
                setTimeout(() => starExplosion(), i * 30);
            }
            document.body.style.transition = "1s";
            document.body.style.filter = "brightness(1.15)";
            setTimeout(() => document.body.style.filter = "brightness(1)", 1000);
            setTimeout(() => { stepIndex = 1; render(); }, 1500);
        });
    }
    
    function renderStep1() {
        app.innerHTML = `<div class="step active-step"><h2>❤️‍🔥 Le jeu du refus</h2><div class="refusal-area"><button class="btn-yes" id="yesBtn">❤️ Bien sûr 🌹</button><button class="btn-no" id="noBtn">🙈 Non</button></div><div id="badboyMsg" style="text-align:center; margin-top:1rem;"></div></div>`;
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const msgDiv = document.getElementById('badboyMsg');
        const phrases = ["T’as déjà vu un gangster accepter un non ? Moi non plus.","Ce bouton ? Juste une légende urbaine.","Désolé princesse, mais ton cœur a déjà répondu.","T’es mignonne à essayer… mais c’est OUI."];
        let evade=0;
        function moveNo() {
            if(evade>=4) { if(noBtn){ noBtn.style.transform='scale(0)'; msgDiv.innerHTML="Bon d’accord… Mais t’as capté l’idée 😏"; } return; }
            const x=Math.random()*(window.innerWidth-150), y=Math.random()*(window.innerHeight-100);
            if(noBtn){ noBtn.style.position='fixed'; noBtn.style.left=x+'px'; noBtn.style.top=y+'px'; msgDiv.innerHTML=phrases[evade%phrases.length]; evade++; }
        }
        if(noBtn) { noBtn.addEventListener('mouseenter', moveNo); noBtn.addEventListener('click', moveNo); }
        yesBtn?.addEventListener('click', (e)=>{
            rainEmojis('💋', 30);
            rainEmojis('💖', 30);
            rainEmojis('✨', 40);
            for(let i=0;i<60;i++) starExplosion();
            nextStep();
        });
    }
    
    function renderStep2() {

    // Canvas arrière plan + étoiles renforcées
    function setupCanvas(){
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        function resize(){ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; }
        window.addEventListener('resize',resize); resize();
        let stars = Array(200).fill().map(()=>({x:Math.random()*w, y:Math.random()*h, r:Math.random()*3, alpha:Math.random()*0.7 + 0.3}));
        function draw(){
            if(!ctx) return;
            ctx.clearRect(0,0,w,h);
            stars.forEach(s=>{ 
                ctx.fillStyle = `rgba(255, 230, 100, ${s.alpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'gold';
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); 
                ctx.fill(); 
                s.x -= 0.4; 
                if(s.x<0) s.x=w; 
            });
            requestAnimationFrame(draw);
        }
        draw();
        document.addEventListener('mousemove',(e)=>{ if(audioCtx && !toggleMuted){ const zone = e.clientY/h; currentPianoVol = zone<0.3 ? 0.5 : 0.3; updatePianoVolume(currentPianoVol); } });
    }
    
    // Triple clic mode braise
    let clickTimer=0;
    let w, h;
    window.addEventListener('resize', () => { w = window.innerWidth; h = window.innerHeight; });
    document.addEventListener('click',(e)=>{
        if(!audioEnabled && !e.target.closest('#audioToggle')){ initAudio(); audioEnabled=true; if(audioCtx) audioCtx.resume(); updatePianoVolume(0.3); }
        clickTimer++;
        setTimeout(()=>clickTimer=0,500);
        if(clickTimer===3){ 
            braiseActive=!braiseActive; 
            if(braiseActive) document.body.classList.add('braise-mode'); 
            else document.body.classList.remove('braise-mode'); 
            for(let i=0;i<30;i++){ 
                const f=document.createElement('div'); 
                f.innerHTML='🔥'; 
                f.style.position='fixed'; 
                f.style.left=Math.random()*window.innerWidth+'px'; 
                f.style.top=Math.random()*window.innerHeight+'px'; 
                f.style.fontSize='2rem';
                f.style.pointerEvents='none'; 
                document.body.appendChild(f); 
                setTimeout(()=>f.remove(),1000); 
            } 
            saveToLocal(); 
        }
    });
    
    const toggleBtn = document.getElementById('audioToggle');
    toggleBtn?.addEventListener('click',()=>{ 
        toggleMuted=!toggleMuted; 
        if(audioCtx){ 
            if(toggleMuted){ 
                pianoGain.gain.value=0; 
                waveGain.gain.value=0; 
                violinGain.gain.value=0; 
            } else { 
                updatePianoVolume(currentPianoVol); 
                waveGain.gain.value=0.12; 
            } 
        } 
        toggleBtn.innerText=toggleMuted?'🔇':'🎧'; 
    });
    
    loadLocal();
    setupCanvas();
    render();
</script>
